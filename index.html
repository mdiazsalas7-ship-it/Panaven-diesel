<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panaven · Control</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Panaven">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- Firebase compat (scripts clásicos: funcionan abriendo el archivo directo) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- jsPDF para notas de entrega -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body{font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent}
  .mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
  .no-sb::-webkit-scrollbar{display:none}.no-sb{-ms-overflow-style:none;scrollbar-width:none}
  @keyframes pop{0%{transform:scale(.96);opacity:0}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .18s ease-out}
  @keyframes slideup{0%{transform:translateY(12px);opacity:0}100%{transform:translateY(0);opacity:1}}
  .slideup{animation:slideup .22s ease-out}
  [x-view]{display:none}[x-view].active{display:block}
  input,select,textarea{outline:none}
</style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-24 md:pb-0">

<!-- ===== HEADER ===== -->
<header class="bg-slate-950 text-white sticky top-0 z-40 border-b border-white/5">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
    <div class="flex items-center gap-2.5 min-w-0">
      <div class="bg-white rounded-lg px-2.5 py-1.5 shrink-0 flex items-center">
        <img id="brandLogo" alt="PANAVEN" class="h-5 md:h-6 w-auto">
      </div>
      <span class="text-[9px] uppercase tracking-[0.3em] text-blue-400 font-bold hidden sm:inline">Control</span>
    </div>
    <!-- TASA DEL DÍA (elemento firma) -->
    <button id="tasaPill" class="flex items-center gap-2 bg-amber-500/10 hover:bg-amber-500/20 border border-amber-500/30 rounded-full pl-3 pr-2 py-1.5 transition shrink-0">
      <span class="text-[8px] uppercase tracking-widest text-amber-400/80 font-black hidden sm:inline">Tasa</span>
      <span class="mono font-bold text-amber-300 text-sm" id="tasaValor">—</span>
      <span class="text-[9px] text-amber-500/60 font-bold">Bs/$</span>
      <span class="text-amber-400/50 text-xs">✎</span>
    </button>
  </div>
</header>

<div class="max-w-6xl mx-auto md:flex">
  <!-- ===== SIDEBAR (desktop) ===== -->
  <aside class="hidden md:block w-52 shrink-0 p-4">
    <nav id="navDesktop" class="sticky top-20 space-y-1"></nav>
    <p id="connState" class="mt-6 text-[10px] text-slate-400 font-bold px-3"></p>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="flex-1 min-w-0 p-4 md:py-6">

    <!-- RESUMEN -->
    <section x-view="resumen" class="active space-y-5">
      <div class="grid grid-cols-2 lg:grid-cols-3 gap-3" id="kpis"></div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-black text-slate-800 uppercase tracking-wide text-sm">Movimientos recientes</h2>
        </div>
        <div id="recientes" class="space-y-1"></div>
      </div>
    </section>

    <!-- INVENTARIO -->
    <section x-view="inventario" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-black text-xl tracking-tight">Inventario</h2>
        <div class="flex gap-2">
          <button onclick="enviarLista()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-sm shadow-emerald-600/20">📄 Lista PDF</button>
          <button onclick="openProducto()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-sm shadow-blue-600/20">+ Producto</button>
        </div>
      </div>
      <div class="relative">
        <input id="invSearch" oninput="renderInventario()" placeholder="Buscar por nombre o código…" class="w-full bg-white border border-slate-300 rounded-xl pl-10 pr-9 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
        <button onclick="document.getElementById('invSearch').value='';renderInventario()" class="absolute right-2 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full text-slate-400 hover:bg-slate-100">✕</button>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
        <div id="invList"></div>
      </div>
    </section>

    <!-- VENTAS -->
    <section x-view="ventas" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-black text-xl tracking-tight">Ventas</h2>
        <button onclick="openVenta()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-sm shadow-blue-600/20">+ Venta</button>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div id="ventList"></div></div>
    </section>

    <!-- GASTOS -->
    <section x-view="gastos" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-black text-xl tracking-tight">Gastos</h2>
        <button onclick="openGasto()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-sm shadow-blue-600/20">+ Gasto</button>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div id="gastList"></div></div>
    </section>

    <!-- POR COBRAR -->
    <section x-view="cobrar" class="space-y-4">
      <h2 class="font-black text-xl tracking-tight">Cuentas por cobrar</h2>
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div id="cobrarList"></div></div>
    </section>

    <!-- CLIENTES -->
    <section x-view="clientes" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-black text-xl tracking-tight">Clientes</h2>
        <button onclick="openCliente()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-4 py-2.5 rounded-xl shadow-sm shadow-blue-600/20">+ Cliente</button>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden"><div id="cliList"></div></div>
    </section>

    <!-- CUENTAS -->
    <section x-view="cuentas" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <h2 class="font-black text-xl tracking-tight">Cuentas para pago</h2>
      </div>
      <p class="text-sm text-slate-500 -mt-2">Toca un banco para enviarle los datos al cliente por WhatsApp.</p>
      <div id="cuentasList" class="space-y-3"></div>
    </section>

  </main>
</div>

<!-- ===== BOTTOM NAV (mobile) ===== -->
<nav id="navMobile" class="md:hidden fixed bottom-0 inset-x-0 z-40 bg-slate-950/95 backdrop-blur border-t border-white/10 grid grid-cols-7"></nav>

<!-- ===== MODAL ===== -->
<div id="modalWrap" class="fixed inset-0 z-50 hidden">
  <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onclick="closeModal()"></div>
  <div class="absolute inset-x-0 bottom-0 md:inset-0 md:flex md:items-center md:justify-center">
    <div id="modalBox" class="slideup bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-3xl max-h-[92vh] overflow-y-auto no-sb shadow-2xl"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div id="toast" class="fixed bottom-24 md:bottom-6 left-1/2 -translate-x-1/2 z-[60] hidden">
  <div id="toastBox" class="pop px-5 py-3 rounded-2xl shadow-2xl font-bold text-sm text-white"></div>
</div>

/* ===================== ESTADO ===================== */
const S = { productos:[], ventas:[], gastos:[], clientes:[], tasa:{ valor:0, fuente:'—' }, view:'resumen' };

/* ===================== HELPERS DE DINERO ===================== */
const usd = n => '$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const bs  = n => 'Bs ' + (Number(n)||0).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});
const toBs = n => (Number(n)||0) * (S.tasa.valor||0);
// bloque de dinero dual: USD grande + Bs pequeño
const dual = (n, cls='') => `<div class="leading-tight ${cls}"><div class="mono font-bold">${usd(n)}</div><div class="mono text-[10px] text-slate-400">${bs(toBs(n))}</div></div>`;
const fecha = ms => new Date(ms).toLocaleDateString('es-VE',{day:'2-digit',month:'short',year:'2-digit'});
const inMonth = ms => { const d=new Date(ms), n=new Date(); return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear(); };
const abonado = v => (v.abonos||[]).reduce((a,b)=>a+(b.monto||0),0);
const saldo = v => Math.max(0, (v.total||0) - abonado(v));

/* ===================== TOAST ===================== */
let toastT;
function toast(msg, type='ok'){
  const box=document.getElementById('toastBox');
  box.className='pop px-5 py-3 rounded-2xl shadow-2xl font-bold text-sm text-white '+
    (type==='err'?'bg-red-600':type==='warn'?'bg-amber-600':'bg-slate-900');
  box.textContent=msg;
  document.getElementById('toast').classList.remove('hidden');
  clearTimeout(toastT);
  toastT=setTimeout(()=>document.getElementById('toast').classList.add('hidden'),2600);
}

/* ===================== MODAL ===================== */
function showModal(html){
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalWrap').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modalWrap').classList.add('hidden'); }
const inputCls="w-full bg-slate-100 rounded-xl px-4 py-3 font-semibold text-slate-800 focus:ring-2 focus:ring-blue-500 border border-transparent focus:border-blue-500";
const lblCls="block text-[11px] uppercase tracking-widest font-black text-slate-400 mb-1.5 mt-3";
function modalHeader(t){
  return `<div class="sticky top-0 bg-white px-5 pt-5 pb-3 flex items-center justify-between border-b border-slate-100 z-10">
    <h3 class="font-black text-lg tracking-tight">${t}</h3>
    <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-bold">✕</button></div>`;
}

/* ===================== NAVEGACIÓN ===================== */
const VIEWS=[
  {id:'resumen', label:'Resumen', short:'Resumen', icon:'📊'},
  {id:'inventario', label:'Inventario', short:'Stock', icon:'📦'},
  {id:'ventas', label:'Ventas', short:'Ventas', icon:'💵'},
  {id:'gastos', label:'Gastos', short:'Gastos', icon:'🧾'},
  {id:'cobrar', label:'Por cobrar', short:'Cobrar', icon:'⏳'},
  {id:'clientes', label:'Clientes', short:'Clientes', icon:'👥'},
  {id:'cuentas', label:'Cuentas', short:'Cuentas', icon:'🏦'},
];
function go(id){
  S.view=id;
  document.querySelectorAll('[x-view]').forEach(e=>e.classList.toggle('active', e.getAttribute('x-view')===id));
  renderNav(); renderAll();
}
function renderNav(){
  document.getElementById('navDesktop').innerHTML = VIEWS.map(v=>`
    <button onclick="go('${v.id}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl font-bold text-sm transition ${S.view===v.id?'bg-blue-600 text-white shadow-sm shadow-blue-600/20':'text-slate-500 hover:bg-slate-200'}">
      <span>${v.icon}</span>${v.label}
      ${v.id==='cobrar'?`<span id="badgeCobrar" class="ml-auto"></span>`:''}
    </button>`).join('');
  document.getElementById('navMobile').innerHTML = VIEWS.map(v=>`

}

/* ===================== RENDER GENERAL ===================== */
function renderAll(){ renderResumen(); renderInventario(); renderVentas(); renderGastos(); renderCobrar(); renderClientes(); renderCuentas(); renderBadges(); }

function renderBadges(){
  const pend=S.ventas.filter(v=>v.credito && saldo(v)>0).length;
  const el=document.getElementById('badgeCobrar');
  if(el) el.innerHTML = pend?`<span class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">${pend}</span>`:'';
}

function _cuentaTexto(c){ return '🏦 ' + c.nombre.toUpperCase() + ' — INVERSIONES PANAVEN, C.A\n\n' + c.filas.join('\n'); }
function _dataURLaBlob(durl){ const i=durl.indexOf(','); const mime=(durl.slice(0,i).match(/:(.*?);/)||[])[1]||'image/png'; const bin=atob(durl.slice(i+1)); const arr=new Uint8Array(bin.length); for(let k=0;k<bin.length;k++)arr[k]=bin.charCodeAt(k); return new Blob([arr],{type:mime}); }
function renderCuentas(){
  const el=document.getElementById('cuentasList'); if(!el) return;
  el.innerHTML = CUENTAS.map(c=>`
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-3 flex items-center gap-3" style="border-left:6px solid ${c.color}">
        <div class="font-black text-slate-800 text-base flex-1">${c.nombre}</div>
        ${c.qr?`<span class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">con QR</span>`:''}
      </div>
      <div class="px-4 pb-3 text-sm text-slate-600 whitespace-pre-line leading-relaxed">${c.filas.join('\n')}</div>
      <div class="px-4 pb-4 flex flex-wrap gap-2">
        <button onclick="enviarCuenta('${c.id}')" class="flex-1 min-w-[130px] bg-green-600 hover:bg-green-700 text-white font-bold text-sm px-3 py-2.5 rounded-xl">📲 Enviar datos</button>
        <button onclick="copiarCuenta('${c.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold text-sm px-3 py-2.5 rounded-xl">Copiar</button>
        ${c.qr?`<button onclick="enviarQR('${c.id}')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-sm px-3 py-2.5 rounded-xl">🖼 Enviar QR</button>`:''}
      </div>
    </div>`).join('');
}
async function enviarCuenta(id){
  const c=CUENTAS.find(x=>x.id===id); if(!c) return;
  const text=_cuentaTexto(c);
  try{
    if(navigator.share){ await navigator.share({text}); }
    else { await navigator.clipboard.writeText(text); toast('Datos copiados',''); }
  }catch(e){ if(e&&e.name==='AbortError')return; try{ await navigator.clipboard.writeText(text); toast('Datos copiados',''); }catch(_){ toast('No se pudo compartir','err'); } }
}
async function copiarCuenta(id){
  const c=CUENTAS.find(x=>x.id===id); if(!c) return;
  try{ await navigator.clipboard.writeText(_cuentaTexto(c)); toast('Datos copiados al portapapeles',''); }
  catch(e){ toast('No se pudo copiar','err'); }
}
async function enviarQR(id){
  const c=CUENTAS.find(x=>x.id===id); if(!c||!c.qr) return;
  try{
    const blob=_dataURLaBlob(c.qr);
    const file=new File([blob], 'QR_'+c.id+'.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text:_cuentaTexto(c)});
    } else {
      const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='QR_'+c.id+'.png'; a.click(); setTimeout(()=>URL.revokeObjectURL(url),5000);
    }
  }catch(e){ if(e&&e.name==='AbortError')return; toast('No se pudo enviar el QR','err'); }
}

/* ---------- RESUMEN ---------- */
function renderResumen(){
  const ingresosMes = S.ventas.reduce((a,v)=>a+(v.abonos||[]).filter(p=>inMonth(p.fecha)).reduce((x,y)=>x+(y.monto||0),0),0);
  const gastosMes = S.gastos.filter(g=>inMonth(g.fecha)).reduce((a,g)=>a+(g.monto||0),0);
  const porCobrar = S.ventas.filter(v=>v.credito).reduce((a,v)=>a+saldo(v),0);
  const valorInv = S.productos.reduce((a,p)=>a+((p.costo||0)*(p.stock||0)),0);
  const bajoStock = S.productos.filter(p=>(p.stock||0)<=(p.stockMin||0)).length;
  const utilidad = ingresosMes - gastosMes;

  const card=(label,val,color,sub)=>`
    <div class="bg-white rounded-2xl border border-slate-200 p-4">
      <div class="text-[10px] uppercase tracking-widest font-black text-slate-400">${label}</div>
      <div class="mono font-extrabold text-xl mt-1 ${color}">${usd(val)}</div>
      <div class="mono text-[11px] text-slate-400">${bs(toBs(val))}</div>
      ${sub?`<div class="text-[11px] font-bold text-slate-500 mt-1">${sub}</div>`:''}
    </div>`;

  document.getElementById('kpis').innerHTML =
    card('Ingresos del mes', ingresosMes, 'text-green-600') +
    card('Gastos del mes', gastosMes, 'text-red-600') +
    card('Utilidad del mes', utilidad, utilidad>=0?'text-slate-900':'text-red-600') +
    card('Por cobrar', porCobrar, 'text-amber-600') +
    card('Valor inventario', valorInv, 'text-slate-900') +
    `<div class="bg-white rounded-2xl border border-slate-200 p-4">
      <div class="text-[10px] uppercase tracking-widest font-black text-slate-400">Stock bajo</div>
      <div class="font-extrabold text-xl mt-1 ${bajoStock?'text-red-600':'text-slate-900'}">${bajoStock} <span class="text-sm text-slate-400 font-bold">productos</span></div>
      <div class="text-[11px] font-bold text-slate-500 mt-1">${S.productos.length} en catálogo</div>
    </div>`;

  // movimientos recientes (ventas + gastos)
  const movs=[
    ...S.ventas.map(v=>({t:'venta', fecha:v.fecha, label:v.cliente||'Venta', monto:v.total})),
    ...S.gastos.map(g=>({t:'gasto', fecha:g.fecha, label:g.concepto, monto:-g.monto})),
  ].sort((a,b)=>b.fecha-a.fecha).slice(0,8);

  document.getElementById('recientes').innerHTML = movs.length? movs.map(m=>`
    <div class="flex items-center gap-3 py-2.5 border-b border-slate-50 last:border-0">
      <div class="w-9 h-9 rounded-lg flex items-center justify-center text-sm ${m.t==='venta'?'bg-green-50':'bg-red-50'}">${m.t==='venta'?'💵':'🧾'}</div>
      <div class="min-w-0 flex-1"><div class="font-bold text-sm truncate">${m.label}</div><div class="text-[11px] text-slate-400 font-semibold">${fecha(m.fecha)}</div></div>
      <div class="mono font-bold text-sm ${m.monto>=0?'text-green-600':'text-red-600'}">${m.monto>=0?'+':'−'}${usd(Math.abs(m.monto))}</div>
    </div>`).join('')
    : emptyState('Aún no hay movimientos. Registra una venta o un gasto para empezar.');
}

function emptyState(txt){
  return `<div class="text-center py-10 px-6"><div class="text-3xl mb-2 opacity-40">📭</div><p class="text-sm font-semibold text-slate-400 max-w-xs mx-auto">${txt}</p></div>`;
}
function rowWrap(inner){ return `<div class="divide-y divide-slate-100">${inner}</div>`; }

/* ---------- INVENTARIO ---------- */
function renderInventario(){
  const el=document.getElementById('invList');
  if(!S.productos.length){ el.innerHTML=emptyState('Tu inventario está vacío. Toca “+ Producto” para agregar el primero.'); return; }
  const q=(document.getElementById('invSearch')?.value||'').trim().toLowerCase();
  let items=[...S.productos].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  if(q){ items=items.filter(p=>((p.nombre||'')+' '+(p.sku||'')).toLowerCase().includes(q)); }
  if(!items.length){ el.innerHTML=emptyState('No se encontró ningún producto que coincida con “'+q+'”.'); return; }
  el.innerHTML=rowWrap(items.map(p=>{
    const bajo=(p.stock||0)<=(p.stockMin||0);
    return `<div class="flex items-center gap-3 p-4">

let fotoTmp = null;
function renderFotoPrev(){
  const el=document.getElementById('fotoPrev'); if(!el) return;
  if(fotoTmp){
    el.innerHTML=`<div class="flex items-center gap-3">
      <img src="${fotoTmp}" class="w-20 h-20 rounded-xl object-cover border border-slate-200">
      <label class="text-blue-600 font-bold text-sm cursor-pointer">Cambiar
        <input type="file" accept="image/*" class="hidden" onchange="onFotoPick(this)"></label>
      <button type="button" onclick="quitarFoto()" class="text-red-600 font-bold text-sm">Quitar</button>
    </div>`;
  } else {
    el.innerHTML=`<label class="flex items-center justify-center gap-2 w-full bg-slate-100 hover:bg-slate-200 rounded-xl py-3 font-bold text-slate-500 text-sm cursor-pointer">
      📷 Tomar o elegir foto
      <input type="file" accept="image/*" class="hidden" onchange="onFotoPick(this)"></label>`;
  }
}
function onFotoPick(input){
  const file=input.files&&input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=600; let w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      fotoTmp=c.toDataURL('image/jpeg',0.6);
      renderFotoPrev();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function quitarFoto(){ fotoTmp=null; renderFotoPrev(); }

async function saveVenta(){
  if(!ventaItems.length){ toast('Agrega al menos un producto','warn'); return; }
  // validar stock
  for(const it of ventaItems){
    const p=S.productos.find(x=>x.id===it.prodId);
    if(p && (p.stock||0) < it.cant){ toast(`Stock insuficiente de ${it.nombre} (hay ${p.stock||0})`,'err'); return; }
  }
  const total=ventaItems.reduce((a,b)=>a+b.precio*b.cant,0);
  const credito=window._tipo==='credito';
  const clienteId=val('v_cliente');
  const clienteObj=S.clientes.find(c=>c.id===clienteId);
  const cliente=clienteObj? clienteObj.nombre : '';
  if(credito && !clienteId){ toast('Elige el cliente al que le fías (o créalo con “+ nuevo”)','warn'); return; }
  const now=Date.now();
  const venta={
    cliente, clienteId: clienteId||null, total, credito, fecha:now, creado:now,
    tasa:S.tasa.valor||0,
    items:ventaItems.map(i=>({prodId:i.prodId, nombre:i.nombre, sku:i.sku||'', cant:i.cant, precio:i.precio})),
    abonos: credito? [] : [{ fecha:now, monto:total, tasa:S.tasa.valor||0, nota:'Pago de contado' }]
  };
  try{
    const batch=db.batch();
    const ref=db.collection('ventas').doc();
    batch.set(ref, venta);
    for(const it of ventaItems){
      const p=S.productos.find(x=>x.id===it.prodId);
      if(p) batch.update(db.collection('productos').doc(it.prodId), {stock:(p.stock||0)-it.cant});
    }
    await batch.commit();
    const vGuardada={ id:ref.id, ...venta };
    toast('Venta registrada · stock descontado');
    showModal(modalHeader('Venta registrada')+`
      <div class="p-5 pt-3 text-center">
        <div class="text-4xl mb-2">✅</div>
        <p class="font-bold text-slate-800">Venta registrada y stock descontado.</p>
        <p class="text-sm text-slate-500 mb-5">${credito? 'Quedó en cuentas por cobrar a nombre de '+(cliente||'el cliente')+'.' : 'Pagada de contado.'}</p>
        <button id="btnNota" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-3.5 rounded-xl mb-2">📄 Enviar nota de entrega (PDF)</button>
        <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">Listo</button>
      </div>`);
    const bn=document.getElementById('btnNota'); if(bn) bn.onclick=()=>enviarNota(vGuardada);
  }catch(e){ toast('No se pudo registrar la venta','err'); console.error(e); }
}

function enviarNotaPorId(id){ const v=S.ventas.find(x=>x.id===id); if(v) enviarNota(v); }
function notaPDFBlob(v){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // Encabezado con logo
  try {
    const lw = 52; const lh = lw / 5.605; // proporción real del logo

  } catch(e){
    doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(15,23,42);
    doc.text('PANAVEN', 14, 22);
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(14); doc.setTextColor(15,23,42);
  doc.text('NOTA DE ENTREGA', 196, 16, {align:'right'});
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(90,90,90);
  doc.text('N° ' + (v.id ? v.id.slice(0,6).toUpperCase() : '—'), 196, 22, {align:'right'});
  doc.text(new Date(v.fecha).toLocaleDateString('es-VE'), 196, 27, {align:'right'});
  doc.setFontSize(7.5); doc.setTextColor(120,120,120);
  doc.text('Inversiones Panaven, C.A.   ·   RIF: J-30684267-5   ·   Tel: 0424-3740258', 14, 31);
  doc.setDrawColor(37,99,235); doc.setLineWidth(0.8); doc.line(14, 34, 196, 34); doc.setLineWidth(0.2);

  // Cliente
  let y = 42;
  doc.setTextColor(15,23,42); doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('CLIENTE', 14, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.text(v.cliente || 'Cliente de contado', 14, y+6);
  const c = S.clientes.find(x => x.id === v.clienteId);
  let yy = y+11; doc.setFontSize(9); doc.setTextColor(90,90,90);
  if (c && c.telefono){ doc.text('Tel: ' + c.telefono, 14, yy); yy+=5; }
  if (c && c.rif){ doc.text('RIF/CI: ' + c.rif, 14, yy); yy+=5; }

  // Tabla
  let ty = y + 24;
  doc.setFillColor(241,245,249); doc.rect(14, ty-5, 182, 8, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(71,85,105);
  doc.text('CÓDIGO', 16, ty);
  doc.text('DESCRIPCIÓN', 45, ty);
  doc.text('CANT', 132, ty, {align:'right'});
  doc.text('P. UNIT', 162, ty, {align:'right'});
  doc.text('TOTAL', 194, ty, {align:'right'});
  ty += 8;
  doc.setFont('helvetica','normal'); doc.setTextColor(15,23,42); doc.setFontSize(9);
  (v.items || []).forEach(it => {
    if (ty > 268){ doc.addPage(); ty = 20; }
    const prod = S.productos.find(p => p.id === it.prodId) || {};
    const sku = it.sku || prod.sku || '';
    doc.text(String(sku).slice(0,16), 16, ty);
    doc.text(String(it.nombre || '').slice(0,46), 45, ty);
    doc.text(String(it.cant), 132, ty, {align:'right'});
    doc.text('$' + (Number(it.precio)||0).toFixed(2), 162, ty, {align:'right'});
    doc.text('$' + ((Number(it.precio)||0)*(Number(it.cant)||0)).toFixed(2), 194, ty, {align:'right'});
    doc.setDrawColor(226,232,240); doc.line(14, ty+2.5, 196, ty+2.5);
    ty += 8;
  });

  // Totales (solo en dólares; la tasa se cuadra aparte con el cliente)
  ty += 5;
  doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(15,23,42);
  doc.text('TOTAL:  $' + (Number(v.total)||0).toFixed(2), 194, ty, {align:'right'});

  // Estado de pago
  ty += 12; doc.setFontSize(10);
  if (v.credito){
    const ab = (v.abonos||[]).reduce((a,b)=>a+(b.monto||0),0);
    const sld = Math.max(0, (v.total||0) - ab);
    doc.setFont('helvetica','bold'); doc.setTextColor(180,83,9);
    doc.text('VENTA A CRÉDITO', 14, ty);
    doc.setFont('helvetica','normal'); doc.setTextColor(15,23,42); doc.setFontSize(9);
    doc.text('Abonado: $' + ab.toFixed(2) + '     Saldo pendiente: $' + sld.toFixed(2), 14, ty+6);
  } else {
    doc.setFont('helvetica','bold'); doc.setTextColor(22,163,74);
    doc.text('PAGADO / CONTADO', 14, ty);
  }

  // Pie
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text('C.C. Morichal, Nivel Feria, Local 26, La Victoria, Estado Aragua, Venezuela', 14, 283);
  doc.text('Documento de entrega. Conserve este comprobante. Gracias por su preferencia.', 14, 288);

  return doc.output('blob');
}
async function enviarNota(v){
  if (!window.jspdf){ toast('No se pudo cargar el generador de PDF (revisa tu conexión)','err'); return; }
  try{
    const blob = notaPDFBlob(v);
    const fname = 'NotaEntrega_' + ((v.cliente||'cliente').replace(/\s+/g,'_')) + '.pdf';
    const file = new File([blob], fname, { type:'application/pdf' });
    if (navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:'Nota de entrega', text:'Nota de entrega · Panaven' });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }
  }catch(e){
    if (e && e.name === 'AbortError') return; // el usuario canceló el compartir
    console.error(e); toast('No se pudo generar el PDF','err');
  }
}

    let drawable=null, iw=0, ih=0, bmp=null;
    if (typeof createImageBitmap === 'function'){
      try { const r=await fetch(src); const b=await r.blob(); bmp=await createImageBitmap(b); drawable=bmp; iw=bmp.width; ih=bmp.height; } catch(e){ drawable=null; }
    }
    if (!drawable){
      const img=await new Promise(res=>{ const i=new Image(); let d=false; const t=setTimeout(()=>{if(!d){d=true;res(null);}},10000); i.onload=()=>{if(d)return;d=true;clearTimeout(t);res(i);}; i.onerror=()=>{if(d)return;d=true;clearTimeout(t);res(null);}; i.src=src; });
      if (!img) return null; drawable=img; iw=img.naturalWidth||img.width; ih=img.naturalHeight||img.height;
    }
    if (!iw||!ih) return null;
    const W=900, H=Math.round(900*ih/iw);
    const c=document.createElement('canvas'); c.width=W; c.height=H;
    const ctx=c.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    ctx.drawImage(drawable,0,0,W,H);
    if (bmp&&bmp.close) bmp.close();
    return { data:c.toDataURL('image/jpeg',0.85), ratio: ih/iw };
  } catch(e){ return null; }
}
function precioDetal(precio){ return (Number(precio)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
// Carga una imagen lista para dibujar en canvas (robusto en celulares).
function cargarDibujable(src){
  return new Promise(resolve => {
    if (!src){ resolve(null); return; }
    const img=new Image();
    try { img.crossOrigin = 'anonymous'; } catch(e){}
    let done=false;
    const t=setTimeout(()=>{ if(!done){done=true;resolve(null);} }, 10000);
    img.onload=()=>{ if(done)return; done=true; clearTimeout(t); resolve({d:img,w:img.naturalWidth||img.width,h:img.naturalHeight||img.height}); };
    img.onerror=()=>{ if(done)return; done=true; clearTimeout(t); resolve(null); };
    img.src=src;
  });
}
function _rRect(ctx,x,y,w,h,r){
  if (ctx.roundRect){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); return; }
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function _wrap(ctx,text,maxW){
  const words=String(text).split(/\s+/); const lines=[]; let cur='';
  for (const w of words){ const t=cur?cur+' '+w:w; if (ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=w; } else cur=t; }
  if (cur) lines.push(cur); return lines;
}
async function fichaImagenBlob(p, sinFoto){
  const W=1080, M=70;
  // --- Medir textos que se ajustan (nombre y aplica) ---
  const mc=document.createElement('canvas').getContext('2d');
  mc.font='bold 46px Arial';
  let nameLines=_wrap(mc, String(p.nombre||'Inyector'), W-150);
  if (nameLines.length>2){ nameLines=nameLines.slice(0,2); nameLines[1]=nameLines[1]+'…'; }
  const datos=[];
  if (p.ohm)       datos.push(['Resistencia', p.ohm]);
  if (p.caudal)    datos.push(['Caudal / llenado', p.caudal]);
  if (p.orificios) datos.push(['N° de orificios', p.orificios]);
  if (p.conector)  datos.push(['Conector', p.conector]);
  const aplica=(p.aplica||'').trim();
  mc.font='400 30px Arial';
  const aplicaLines = aplica ? _wrap(mc, aplica, W-2*M) : [];

  // --- Calcular posiciones y alto total ---
  const box=480, boxY=190, fotoEnd=boxY+box;            // foto
  let y = fotoEnd + 64;
  const nameY0 = y;
  y = nameY0 + (nameLines.length-1)*54 + 14;            // fin nombre
  const codLabelY = y + 34, codValY = codLabelY + 48;
  y = codValY + 6;                                       // fin código
  const hayDatos = datos.length>0 || aplicaLines.length>0;
  let divY=0, datosTop=0, rowH=58;
  if (hayDatos){
    divY = y + 22; datosTop = divY + 50;
    y = datosTop + datos.length*rowH;
    if (aplicaLines.length){ y += 8 + 40 + aplicaLines.length*38; }
  }
  const pillY = y + (hayDatos?34:40), pillH=120;
  y = pillY + pillH;
  const footY1 = y + 66, footY2 = footY1 + 36;
  const H = Math.round(footY2 + 40);

  // --- Dibujar ---
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);

  // Logo + título
  const logo=await cargarDibujable(LOGO_PANAVEN);
  if (logo){ const lh=74, lw=lh*(logo.w/logo.h); ctx.drawImage(logo.d, 60, 52, lw, lh); }
  else { ctx.fillStyle='#0f172a'; ctx.font='bold 56px Arial'; ctx.fillText('PANAVEN', 60, 112); }
  ctx.textAlign='right';
  ctx.fillStyle='#0f172a'; ctx.font='bold 46px Arial'; ctx.fillText('FICHA TÉCNICA', W-60, 92);
  ctx.fillStyle='#94a3b8'; ctx.font='400 24px Arial'; ctx.fillText('Repuestos diésel e inyección', W-60, 128);
  ctx.textAlign='left';
  ctx.strokeStyle='#2563eb'; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(60,162); ctx.lineTo(W-60,162); ctx.stroke();

  // Foto
  const boxX=(W-box)/2;
  _rRect(ctx, boxX, boxY, box, box, 26); ctx.fillStyle='#f8fafc'; ctx.fill();
  ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2; ctx.stroke();
  const foto = sinFoto ? null : await cargarDibujable(p.foto);
  if (foto){
    const pad=24, availW=box-pad*2, availH=box-pad*2;
    const r=Math.min(availW/foto.w, availH/foto.h);
    const w=foto.w*r, h=foto.h*r;
    ctx.drawImage(foto.d, boxX+(box-w)/2, boxY+(box-h)/2, w, h);
  } else {
    ctx.fillStyle='#cbd5e1'; ctx.font='400 32px Arial'; ctx.textAlign='center';
    ctx.fillText('(Sin foto)', W/2, boxY+box/2+10); ctx.textAlign='left';
  }

  // Nombre
  ctx.fillStyle='#0f172a'; ctx.font='bold 46px Arial'; ctx.textAlign='center';
  nameLines.forEach((l,i)=>{ ctx.fillText(l, W/2, nameY0+i*54); });
  // Código
  ctx.fillStyle='#64748b'; ctx.font='bold 26px Arial'; ctx.fillText('NÚMERO DE PARTE', W/2, codLabelY);
  ctx.fillStyle='#0f172a'; ctx.font='bold 44px "Courier New", monospace'; ctx.fillText(String(p.sku||'—'), W/2, codValY);
  ctx.textAlign='left';

  // Datos técnicos
  if (hayDatos){
    ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(M,divY); ctx.lineTo(W-M,divY); ctx.stroke();
    ctx.fillStyle='#2563eb'; ctx.font='bold 24px Arial'; ctx.textAlign='left';
    ctx.fillText('DATOS TÉCNICOS', M, divY+34);
    let ry = datosTop;
    datos.forEach(([k,v])=>{
      ctx.fillStyle='#64748b'; ctx.font='400 30px Arial'; ctx.textAlign='left';
      ctx.fillText(k, M, ry+18);
      ctx.fillStyle='#0f172a'; ctx.font='bold 32px Arial'; ctx.textAlign='right';
      ctx.fillText(String(v), W-M, ry+18);
      ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(M,ry+rowH-18); ctx.lineTo(W-M,ry+rowH-18); ctx.stroke();
      ry += rowH;
    });
    if (aplicaLines.length){
      ctx.fillStyle='#64748b'; ctx.font='400 30px Arial'; ctx.textAlign='left';
      ctx.fillText('Aplica para:', M, ry+18); ry += 40;
      ctx.fillStyle='#0f172a'; ctx.font='bold 30px Arial';
      aplicaLines.forEach(l=>{ ctx.fillText(l, M, ry+18); ry += 38; });
    }
  }

  // Precio
  const pillW=W-2*M, pillX=M;
  _rRect(ctx, pillX, pillY, pillW, pillH, 20); ctx.fillStyle='#166534'; ctx.fill();
  ctx.fillStyle='#dcfce7'; ctx.font='bold 30px Arial'; ctx.textAlign='left';
  ctx.fillText('PRECIO', pillX+44, pillY+pillH/2+11);
  ctx.fillStyle='#ffffff'; ctx.font='bold 66px Arial'; ctx.textAlign='right';
  ctx.fillText('$'+precioDetal(p.precio), pillX+pillW-44, pillY+pillH/2+24);
  ctx.textAlign='left';

  // Pie
  ctx.textAlign='center';
  ctx.fillStyle='#2563eb'; ctx.font='bold 30px Arial'; ctx.fillText('Pedidos por WhatsApp: 0424 374 0258', W/2, footY1);
  ctx.fillStyle='#94a3b8'; ctx.font='400 23px Arial'; ctx.fillText('Inversiones Panaven, C.A.  ·  La Victoria, Aragua', W/2, footY2);
  ctx.textAlign='left';

  try {
    let blob = await new Promise(res => c.toBlob(b=>res(b), 'image/jpeg', 0.92));
    if (!blob){
      const durl = c.toDataURL('image/jpeg', 0.92);
      const bin = atob(durl.split(',')[1]);
      const arr = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
      blob = new Blob([arr], { type:'image/jpeg' });
    }
    return blob;
  } catch(e){
    if (!sinFoto) return await fichaImagenBlob(p, true);
    throw e;
  }
}
async function enviarFicha(id){
  const p = S.productos.find(x=>x.id===id);
  if (!p){ toast('Producto no encontrado','err'); return; }
  try{
    toast('Generando ficha…','info');
    const blob = await fichaImagenBlob(p);
    if (!blob){ toast('Ficha: la imagen salió vacía (blob nulo)','err'); return; }
    const limpio = String(p.nombre||'inyector').replace(/[^a-zA-Z0-9]+/g,'_').slice(0,40);
    const fname = 'Ficha_' + limpio + '.jpg';
    const file = new File([blob], fname, { type:'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file], title:'Ficha técnica', text: (p.nombre||'Inyector') + ' · Panaven' });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download=fname; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 5000);
    }
  }catch(e){
    if (e && e.name === 'AbortError') return;
    console.error(e); toast('Ficha error: ' + (e && e.message ? e.message : String(e)), 'err');
  }
}

function listaColHeader(doc, ty){
  doc.setFillColor(241,245,249); doc.rect(14, ty-5.5, 182, 9, 'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(71,85,105);
  doc.text('CÓDIGO', 16, ty);
  doc.text('DESCRIPCIÓN', 52, ty);

function listaPDFBlob(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const items = S.productos
    .filter(p => (p.stock||0) > 0)
    .sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));

  listaHeaderPDF(doc);
  let ty = 45;
  listaColHeader(doc, ty);
  ty += 10;

  items.forEach((p) => {
    // descripción puede ocupar 1 o 2 líneas
    doc.setFont('helvetica','bold'); doc.setFontSize(11);
    const desc = doc.splitTextToSize(String(p.nombre||'Sin nombre'), 118).slice(0,2);
    const rowH = desc.length > 1 ? 13 : 9;

    if (ty + rowH > 280){ doc.addPage(); listaHeaderPDF(doc); ty = 45; listaColHeader(doc, ty); ty += 10; }

    // código
    doc.setFont('courier','normal'); doc.setFontSize(10); doc.setTextColor(60,60,60);
    doc.text(String(p.sku||'—').slice(0,16), 16, ty);
    // descripción
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(15,23,42);
    doc.text(desc, 52, ty);
    // precio USD
    doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(22,101,52);
    doc.text('$' + (p.precio||0).toFixed(2), 176, ty, {align:'right'});
    // disponibles
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(15,23,42);
    doc.text(String(p.stock||0), 196, ty, {align:'right'});
    // separador
    doc.setDrawColor(235,235,235); doc.line(14, ty + rowH - 4, 196, ty + rowH - 4);
    ty += rowH;
  });

  if (!items.length){
    doc.setFont('helvetica','normal'); doc.setFontSize(12); doc.setTextColor(120,120,120);
    doc.text('No hay productos con stock disponible en este momento.', 105, 75, {align:'center'});
  }

  // Pie en cada página
  const pages = doc.getNumberOfPages();
  for (let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(37,99,235);
    doc.text('Consultas y pedidos por WhatsApp: 0424-3740258  ·  wa.me/584243740258', 105, 289, {align:'center'});
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(150,150,150);
    doc.text('Precios en USD. Sujetos a cambio sin previo aviso. Disponibilidad al ' + new Date().toLocaleDateString('es-VE') + '.', 105, 293, {align:'center'});
  }
  return doc.output('blob');
}

function renderCobrar(){
  const el=document.getElementById('cobrarList');
  const pend=S.ventas.filter(v=>v.credito && saldo(v)>0);
  if(!pend.length){ cobrarGrupos=[]; el.innerHTML=emptyState('No tienes cuentas por cobrar. Las ventas a crédito con saldo aparecen aquí.'); return; }

  const map=new Map();
  pend.forEach(v=>{
    const key = v.clienteId || ('n:'+(v.cliente||'Cliente'));
    if(!map.has(key)) map.set(key, []);
    map.get(key).push(v);
  });
  cobrarGrupos = [...map.entries()].map(([key,facturas])=>{
    facturas.sort((a,b)=>a.fecha-b.fecha); // más vieja primero (orden de cobro)
    const cli = S.clientes.find(c=>c.id===key);
    return {
      key,
      nombre: cli? cli.nombre : (facturas[0].cliente||'Cliente'),
      tel: cli? (cli.telefono||'') : '',
      facturas,
      totalDebe: facturas.reduce((a,v)=>a+saldo(v),0)
    };
  }).sort((a,b)=> b.totalDebe - a.totalDebe);

  el.innerHTML = cobrarGrupos.map((g,i)=>`
    <div class="p-4 border-b border-slate-100 last:border-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 font-black flex items-center justify-center shrink-0">${(g.nombre||'?').charAt(0).toUpperCase()}</div>
        <div class="min-w-0 flex-1">
          <div class="font-bold text-sm truncate">${g.nombre}</div>
          <div class="text-[11px] text-slate-400 font-semibold">${g.facturas.length} factura(s) pendiente(s)</div>
          ${g.tel?`<a href="tel:${g.tel}" class="text-[11px] text-blue-600 font-bold inline-block">📞 ${g.tel}</a>`:''}
        </div>
        <div class="text-right shrink-0"><div class="text-[9px] uppercase tracking-widest font-black text-slate-400">Debe</div>${dual(g.totalDebe,'text-right')}</div>
      </div>
      <div class="mt-3 space-y-1.5">
        ${g.facturas.map((v,idx)=>`
          <div class="flex items-center gap-2 text-[11px] bg-slate-50 rounded-lg px-3 py-2">
            <span class="font-black text-slate-300 mono w-5">${String(idx+1).padStart(2,'0')}</span>
            <div class="flex-1 min-w-0">
              <span class="font-bold text-slate-600">Factura ${v.id.slice(0,6).toUpperCase()}</span>
              <span class="text-slate-400"> · ${fecha(v.fecha)}</span>
            </div>
            <span class="mono text-slate-400">de ${usd(v.total)}</span>
            <span class="mono font-bold text-amber-600">${usd(saldo(v))}</span>
            <button onclick="enviarNotaPorId('${v.id}')" title="Nota de entrega" class="text-slate-400 hover:text-slate-700">📄</button>
          </div>`).join('')}
      </div>
      <div class="flex gap-2 mt-3">
        <button onclick="openAbonoCliente(${i})" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white font-bold py-2.5 rounded-xl text-sm">Registrar abono</button>
        ${g.tel?`<a href="${waLinkGrupo(g)}" target="_blank" rel="noopener" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 px-4 rounded-xl text-sm flex items-center">💬 Recordar</a>`:''}
      </div>
      <button onclick="openEstadoCuentaGrupo(${i})" class="w-full mt-2 text-[11px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-700">Ver estado de cuenta completo →</button>
    </div>`).join('');
}

/* ---------- CLIENTES ---------- */
function debeCliente(id){ return S.ventas.filter(v=>v.credito && v.clienteId===id).reduce((a,v)=>a+saldo(v),0); }
function renderClientes(){
  const el=document.getElementById('cliList'); if(!el) return;
  if(!S.clientes.length){ el.innerHTML=emptyState('No tienes clientes registrados. Toca “+ Cliente” para agregar a quienes les fías.'); return; }
  const items=[...S.clientes].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||''));
  el.innerHTML=rowWrap(items.map(c=>{
    const debe=debeCliente(c.id);
    const ini=(c.nombre||'?').trim().charAt(0).toUpperCase();
    return `<div class="flex items-center gap-3 p-4">
      <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-700 font-black flex items-center justify-center shrink-0">${ini}</div>
      <div class="min-w-0 flex-1">
        <div class="font-bold text-sm truncate">${c.nombre}</div>
        <div class="text-[11px] text-slate-400 font-semibold truncate">${c.telefono||'Sin teléfono'}${c.rif?' · '+c.rif:''}</div>
      </div>
      <div class="text-right shrink-0">
        ${debe>0?`<div class="text-[9px] uppercase tracking-widest font-black text-slate-400">Debe</div><div class="mono font-bold text-sm text-red-600">${usd(debe)}</div>`:`<div class="text-[10px] font-black text-green-600 uppercase tracking-wide">Al día</div>`}
      </div>
      <div class="flex gap-1 shrink-0">
        <button onclick="openEstadoCuenta('${c.id}')" title="Estado de cuenta" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200">📂</button>
        <button onclick="openCliente('${c.id}')" title="Editar" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200">✎</button>
        <button onclick="delCliente('${c.id}')" title="Eliminar" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-red-100 text-red-600">🗑</button>
      </div>
    </div>`;
  }).join(''));
}
function openCliente(id){
  const c=id? S.clientes.find(x=>x.id===id) : {};
  showModal(modalHeader(id?'Editar cliente':'Nuevo cliente')+`
    <div class="p-5 pt-3">
      <label class="${lblCls}">Nombre o negocio</label>
      <input id="c_nombre" class="${inputCls}" value="${(c.nombre||'').replace(/"/g,'&quot;')}" placeholder="Ej: Taller El Rápido / Juan Pérez">
      <label class="${lblCls}">Teléfono</label>
      <input id="c_tel" class="${inputCls} mono" value="${(c.telefono||'').replace(/"/g,'&quot;')}" placeholder="0412-1234567">
      <label class="${lblCls}">RIF / Cédula (opcional)</label>
      <input id="c_rif" class="${inputCls} mono" value="${(c.rif||'').replace(/"/g,'&quot;')}" placeholder="V-12345678 / J-...">
      <label class="${lblCls}">Nota (opcional)</label>
      <input id="c_nota" class="${inputCls}" value="${(c.nota||'').replace(/"/g,'&quot;')}" placeholder="Dirección, referencia…">
      <button onclick="saveCliente('${id||''}')" class="w-full mt-5 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl">Guardar cliente</button>
    </div>`);
}
async function saveCliente(id){
  const data={ nombre:val('c_nombre'), telefono:val('c_tel'), rif:val('c_rif'), nota:val('c_nota') };
  if(!data.nombre){ toast('Ponle un nombre al cliente','warn'); return; }
  try{
    if(id) await db.collection('clientes').doc(id).update(data);
    else { data.creado=Date.now(); await db.collection('clientes').add(data); }
    closeModal(); toast(id?'Cliente actualizado':'Cliente agregado');
  }catch(e){ toast('No se pudo guardar','err'); }
}
async function delCliente(id){
  const c=S.clientes.find(x=>x.id===id); if(!c) return;
  if(debeCliente(id)>0){ toast('Ese cliente tiene saldo pendiente; cóbralo antes de eliminarlo','warn'); return; }
  if(!confirm(`¿Eliminar a "${c.nombre}"? Sus ventas anteriores se conservan.`)) return;
  try{ await db.collection('clientes').doc(id).delete(); toast('Cliente eliminado'); }catch(e){ toast('No se pudo eliminar','err'); }
}
async function nuevoClienteRapido(){
  const n=prompt('Nombre del nuevo cliente:'); if(!n||!n.trim()) return;
  const tel=(prompt('Teléfono (opcional):')||'').trim();
  try{
    const ref=await db.collection('clientes').add({nombre:n.trim(), telefono:tel, rif:'', nota:'', creado:Date.now()});
    S.clientes.push({id:ref.id, nombre:n.trim(), telefono:tel, rif:'', nota:''});
    rellenarSelectClientes(ref.id);
    toast('Cliente agregado');
  }catch(e){ toast('No se pudo agregar','err'); }
}
function rellenarSelectClientes(selId){
  const sel=document.getElementById('v_cliente'); if(!sel) return;
  sel.innerHTML=`<option value="">— Sin cliente (contado) —</option>`+
    [...S.clientes].sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).map(c=>`<option value="${c.id}" ${c.id===selId?'selected':''}>${c.nombre}</option>`).join('');
}
function openAbonoCliente(i){
  const g=cobrarGrupos[i]; if(!g) return;
  showModal(modalHeader('Registrar abono')+`
    <div class="p-5 pt-3">
      <div class="bg-slate-50 rounded-xl p-4 mb-2">
        <div class="font-bold">${g.nombre}</div>
        <div class="text-[11px] text-slate-400 font-semibold">Debe en total: <span class="mono font-bold text-amber-600">${usd(g.totalDebe)}</span> · ${g.facturas.length} factura(s)</div>
      </div>
      <p class="text-[11px] text-slate-500 font-semibold mb-2 bg-amber-50 border border-amber-100 rounded-lg px-3 py-2">ℹ️ El abono se aplica primero a la factura más antigua, y lo que sobre pasa a la siguiente.</p>
      <label class="${lblCls}">Monto del abono (USD)</label>
      <input id="abc_monto" type="number" step="0.01" max="${g.totalDebe}" value="${g.totalDebe.toFixed(2)}" class="${inputCls} mono">
      <label class="${lblCls}">Nota / referencia (opcional)</label>
      <input id="abc_nota" class="${inputCls}" placeholder="Pago móvil, transferencia, efectivo…">
      <button onclick="saveAbonoCliente(${i})" class="w-full mt-5 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3.5 rounded-xl">Guardar abono</button>
    </div>`);
}
async function saveAbonoCliente(i){
  const g=cobrarGrupos[i]; if(!g) return;
  const M=num('abc_monto'); const nota=val('abc_nota');
  if(!M||M<=0){ toast('Indica un monto válido','warn'); return; }
  if(M>g.totalDebe+0.01){ toast('El abono supera lo que debe el cliente','warn'); return; }
  const now=Date.now(); const tasa=S.tasa.valor||0;
  let restante=M;
  const batch=db.batch();
  for(const v of g.facturas){ // ya ordenadas: más vieja primero
    if(restante<=0.001) break;
    const s=saldo(v);
    const aplica=Math.min(restante, s);
    if(aplica<=0) continue;
    const abonos=[...(v.abonos||[]), {fecha:now, monto:aplica, tasa, nota: nota? nota+' (abono global)' : 'Abono global'}];
    batch.update(db.collection('ventas').doc(v.id), {abonos});
    restante-=aplica;
  }
  try{
    await batch.commit();
    closeModal();
    toast(M>=g.totalDebe-0.01? 'Cuenta del cliente saldada ✅' : 'Abono aplicado a las facturas más antiguas');
  }catch(e){ toast('No se pudo guardar el abono','err'); console.error(e); }
}

/* ===================== TASA DEL DÍA ===================== */
async function fetchTasa(){
  try{
    const r=await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
    if(!r.ok) throw 0;
    const d=await r.json();
    const v=parseFloat(d.promedio||d.venta||0);
    if(v>0) return {valor:v, fuente:'BCV (auto)'};
  }catch(e){}
  return null;
}
function setTasaUI(){
  document.getElementById('tasaValor').textContent = S.tasa.valor? S.tasa.valor.toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
}
document.getElementById('tasaPill').addEventListener('click',()=>{
  showModal(modalHeader('Tasa del día')+`
    <div class="p-5 pt-3">
      <p class="text-sm text-slate-500 font-semibold mb-1">Fuente actual: <b class="text-slate-700">${S.tasa.fuente}</b></p>
      <p class="text-[11px] text-slate-400 font-semibold mb-3">Se intenta actualizar sola desde el BCV al abrir. Si la cambias aquí, se usa tu valor.</p>
      <label class="${lblCls}">Bolívares por dólar</label>
      <input id="t_val" type="number" step="0.01" value="${S.tasa.valor||''}" class="${inputCls} mono text-lg">
      <div class="grid grid-cols-2 gap-2 mt-5">
        <button onclick="refreshTasa()" class="py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:bg-slate-50">↻ Auto (BCV)</button>
        <button onclick="saveTasaManual()" class="py-3 rounded-xl font-bold bg-blue-600 text-white">Guardar tasa</button>
      </div>
    </div>`);
});
async function saveTasaManual(){
  const v=num('t_val'); if(!v||v<=0){ toast('Tasa inválida','warn'); return; }
  try{ await db.collection('config').doc('tasa').set({valor:v, fuente:'Manual', actualizado:Date.now()}); closeModal(); toast('Tasa actualizada'); }
  catch(e){ toast('No se pudo guardar','err'); }
}
async function refreshTasa(){
  const t=await fetchTasa();
  if(!t){ toast('No se pudo conectar al BCV. Ponla a mano.','warn'); return; }
  try{ await db.collection('config').doc('tasa').set({valor:t.valor, fuente:t.fuente, actualizado:Date.now()}); closeModal(); toast('Tasa BCV actualizada'); }
  catch(e){ toast('No se pudo guardar','err'); }
}

/* ===================== UTILES FORM ===================== */
function val(id){ const e=document.getElementById(id); return e? e.value.trim():''; }
function num(id){ const e=document.getElementById(id); return e? (parseFloat(e.value)||0):0; }

/* ===================== SUSCRIPCIONES FIREBASE ===================== */
function connOk(){ const e=document.getElementById('connState'); if(e){e.textContent='● Conectado a Firebase'; e.className='mt-6 text-[10px] text-green-600 font-bold px-3';} }
function connErr(){ const e=document.getElementById('connState'); if(e){e.textContent='● Sin conexión a la base de datos'; e.className='mt-6 text-[10px] text-red-500 font-bold px-3';} toast('Error de conexión con Firebase. Revisa las reglas de Firestore.','err'); }

function start(){
  const bl=document.getElementById('brandLogo'); if(bl) bl.src=LOGO_PANAVEN;
  renderNav(); renderAll(); setTasaUI();

  db.collection('productos').onSnapshot(s=>{ S.productos=s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); connOk(); }, e=>{console.error(e);connErr();});
  db.collection('ventas').onSnapshot(s=>{ S.ventas=s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); }, e=>console.error(e));
  db.collection('gastos').onSnapshot(s=>{ S.gastos=s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); }, e=>console.error(e));
  db.collection('clientes').onSnapshot(s=>{ S.clientes=s.docs.map(d=>({id:d.id,...d.data()})); renderAll(); }, e=>console.error(e));
  db.collection('config').doc('tasa').onSnapshot(d=>{ if(d.exists){ S.tasa=d.data(); setTasaUI(); renderAll(); } }, e=>console.error(e));

  // intentar auto-actualizar tasa al abrir (sin pisar una tasa manual puesta hoy)
  fetchTasa().then(async t=>{
    if(!t) return;
    try{
      const snap=await db.collection('config').doc('tasa').get();
      if(snap.exists){
        const c=snap.data();
        const hoy=new Date(); const upd=new Date(c.actualizado||0);
        const manualHoy = c.fuente==='Manual' && upd.toDateString()===hoy.toDateString();
        if(manualHoy) return; // respetar lo que el usuario fijó hoy
      }
      await db.collection('config').doc('tasa').set({valor:t.valor, fuente:t.fuente, actualizado:Date.now()});
    }catch(e){}
  });
}
start();
</script>
